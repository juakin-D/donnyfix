<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — PhoneHub Ghana</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F7F5F0;color:#111008;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:white;border-radius:16px;padding:40px;max-width:440px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#006B3F;margin-bottom:4px}
    .logo span{color:#FCD116}
    .title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin:20px 0 6px}
    .sub{font-size:14px;color:#4A4740;line-height:1.6;margin-bottom:24px}
    .flash{padding:10px 14px;border-radius:8px;margin-bottom:18px;font-size:14px}
    .flash.success{background:#D1FAE5;color:#065F46}
    .flash.error{background:#FEE2E2;color:#991B1B}
    label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
    input{width:100%;padding:11px 14px;border:1.5px solid #E8E4DC;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
    input:focus{border-color:#006B3F}
    .field{margin-bottom:20px}
    .hint{font-size:12px;color:#8C8880;margin-top:5px}
    .btn{width:100%;padding:13px;background:#006B3F;color:white;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:background .2s}
    .btn:hover{background:#004D2D}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Phone<span>Hub</span></div>
    <div class="title">Set a new password</div>
    <p class="sub">Choose a strong password for your account.</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="/reset-password/{{ token }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required minlength="6" autofocus>
        <div class="hint">Minimum 6 characters</div>
      </div>
      <div class="field">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" required minlength="6">
      </div>
      <button class="btn" type="submit">Update Password</button>
    </form>
  </div>
</body>
</html>
