<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — PhoneHub Ghana</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F7F5F0;color:#111008;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{text-align:center;max-width:480px;width:100%}
    .code{font-family:'Syne',sans-serif;font-size:96px;font-weight:800;color:#006B3F;line-height:1;letter-spacing:-4px;margin-bottom:8px}
    .title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;margin-bottom:12px;color:#111008}
    .sub{font-size:16px;color:#4A4740;font-weight:300;line-height:1.65;margin-bottom:32px}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-primary{display:inline-block;padding:13px 28px;background:#006B3F;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;border-radius:10px;text-decoration:none;transition:background .2s}
    .btn-primary:hover{background:#004D2D}
    .btn-ghost{display:inline-block;padding:13px 28px;border:1.5px solid #E8E4DC;color:#4A4740;font-size:15px;border-radius:10px;text-decoration:none;transition:all .2s}
    .btn-ghost:hover{border-color:#006B3F;color:#006B3F}
    .divider{width:48px;height:3px;background:#FCD116;border-radius:2px;margin:20px auto 28px}
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <div class="divider"></div>
    <div class="title">Page not found</div>
    <p class="sub">The page you're looking for doesn't exist or has been moved. Check the URL or head back home.</p>
    <div class="actions">
      <a href="/" class="btn-primary">Back to Home</a>
      <a href="/booking" class="btn-ghost">Book a Repair</a>
    </div>
  </div>
</body>
</html>
