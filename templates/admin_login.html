<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — PhoneHub Ghana</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0E1210;--surface:#161C18;--surface2:#1D2521;
      --border:#2A3330;--border2:#374440;
      --green:#00C46A;--green-glow:rgba(0,196,106,.12);--green-glow2:rgba(0,196,106,.06);
      --gold:#F5C842;--gold-dim:rgba(245,200,66,.12);
      --red:#E84040;--red-dim:rgba(232,64,64,.12);
      --text:#E8F0EC;--text-soft:#7A9088;--text-muted:#4A5E58;
    }

    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    /* subtle grid pattern same as admin pages */
    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(0,196,106,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,196,106,.025) 1px,transparent 1px);
      background-size:48px 48px;
      pointer-events:none;
    }

    .login-wrap{
      position:relative;z-index:1;
      width:100%;max-width:420px;
    }

    /* logo */
    .logo{
      display:flex;align-items:center;gap:12px;
      margin-bottom:32px;
    }
    .logo-icon{
      width:40px;height:40px;border-radius:10px;
      background:var(--green-glow);
      border:1px solid rgba(0,196,106,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;
    }
    .logo-text{
      font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
      color:var(--text);letter-spacing:-.3px;
    }
    .logo-text span{color:var(--gold);}
    .logo-sub{
      font-family:'DM Mono',monospace;font-size:9px;
      color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;
      margin-top:2px;
    }

    /* card */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:32px;
      box-shadow:0 24px 48px rgba(0,0,0,.4);
    }

    .card-title{
      font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
      color:var(--text);letter-spacing:-.3px;margin-bottom:4px;
    }
    .card-sub{
      font-family:'DM Mono',monospace;font-size:11px;
      color:var(--text-muted);letter-spacing:.5px;
      margin-bottom:24px;
    }

    /* flash */
    .flash{
      display:flex;align-items:center;gap:10px;
      padding:11px 14px;border-radius:8px;
      margin-bottom:16px;font-size:13px;
    }
    .flash.error{
      background:var(--red-dim);color:var(--red);
      border:1px solid rgba(232,64,64,.2);
    }
    .flash.success{
      background:var(--green-glow);color:var(--green);
      border:1px solid rgba(0,196,106,.2);
    }
    .flash-icon{flex-shrink:0;font-size:14px;}

    /* form */
    .field{margin-bottom:16px;}
    .field-label{
      display:block;
      font-family:'DM Mono',monospace;font-size:10px;
      color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;
      margin-bottom:7px;
    }
    .field-input{
      width:100%;padding:11px 14px;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:9px;
      color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:14px;
      outline:none;
      transition:border-color .15s,box-shadow .15s;
    }
    .field-input::placeholder{color:var(--text-muted);}
    .field-input:focus{
      border-color:rgba(0,196,106,.4);
      box-shadow:0 0 0 3px rgba(0,196,106,.08);
    }

    .submit-btn{
      width:100%;margin-top:8px;
      padding:13px;
      background:var(--green);
      border:none;border-radius:9px;
      color:#0E1210;
      font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
      cursor:pointer;
      letter-spacing:-.2px;
      transition:opacity .15s,transform .1s;
    }
    .submit-btn:hover{opacity:.92;}
    .submit-btn:active{transform:scale(.99);}

    /* divider */
    .divider{
      border:none;border-top:1px solid var(--border);
      margin:24px 0 16px;
    }

    .back-link{
      display:flex;align-items:center;gap:6px;
      color:var(--text-soft);font-size:13px;text-decoration:none;
      transition:color .15s;
    }
    .back-link:hover{color:var(--text);}
    .back-link svg{flex-shrink:0;}
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <div>
        <div class="logo-text">Phone<span>Hub</span></div>
        <div class="logo-sub">Admin Portal</div>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-title">Sign in</div>
      <div class="card-sub">Authorized access only</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">
            <span class="flash-icon">{% if category == 'success' %}✓{% else %}✕{% endif %}</span>
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="/admin/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="field">
          <label class="field-label" for="username">Username</label>
          <input class="field-input" id="username" name="username" type="text"
                 placeholder="Enter username" autocomplete="username" required/>
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input class="field-input" id="password" name="password" type="password"
                 placeholder="••••••••" autocomplete="current-password" required/>
        </div>

        <button class="submit-btn" type="submit">Log in →</button>
      </form>

      <hr class="divider"/>

      <a class="back-link" href="/">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M8.5 2.5L4 7l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to website
      </a>
    </div>

  </div>
</body>
</html>
