<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PhoneHub Ghana</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f9f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,107,63,0.1); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { color: #006B3F; font-size: 28px; font-weight: 800; }
    .logo p { color: #6B7280; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #006B3F; box-shadow: 0 0 0 3px rgba(0,107,63,0.1); }
    button[type="submit"] { width: 100%; background: #006B3F; color: white; border: none; padding: 13px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    button[type="submit"]:hover { background: #004D2D; }
    .register-link { text-align: center; margin-top: 18px; font-size: 14px; color: #6B7280; }
    .register-link a { color: #006B3F; font-weight: 600; text-decoration: none; }
    .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .flash.error { background: #FEE2E2; color: #B91C1C; }
    .flash.success { background: #D1FAE5; color: #065F46; }
    .divider { border: none; border-top: 1px solid #E5E7EB; margin: 20px 0; }
    .admin-link { text-align: center; font-size: 13px; color: #9CA3AF; margin-top: 10px; }
    .admin-link a { color: #9CA3AF; text-decoration: none; }
    .admin-link a:hover { color: #006B3F; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>PhoneHub Ghana</h1>
      <p>Log in to your membership account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit">Log In</button>
    </form>

    <div class="register-link">
      Don't have an account? <a href="/register">Sign up — it's free</a>
    </div>

    <hr class="divider" />
    <div class="admin-link">
      <a href="/admin/login">Admin login →</a>
    </div>
  </div>
</body>
</html>
